<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Privé - B&W</title>
    <link rel="icon" type="images/png" href="logobw.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root { 
        --bg: #050505;
        --card: #0f0f0f;
        --accent: #ffcc33;
        --gold-grad: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        --steel: #d4af37;
    }

    body { 
        background-color: var(--bg); 
        color: #ffffff; 
        font-family: 'Outfit'; 
        margin: 0; 
        min-height: 100vh; 
        overflow-x: hidden; 
    }

    /* --- EFFET DE FOND --- */
    body::before {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: radial-gradient(circle at 50% -20%, rgba(191, 149, 63, 0.1) 0%, transparent 50%),
                          url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0.2; pointer-events: none; z-index: 0;
    }

    /* --- SYSTÈME DE PAILLETTES --- */
    #glitter-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    .glitter { position: absolute; background: var(--gold-grad); border-radius: 50%; opacity: 0; animation: fall-and-twinkle linear infinite; }
    @keyframes fall-and-twinkle {
        0% { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    /* --- HEADER --- */
    .header-tools { 
        position: sticky; top: 0; background: rgba(5, 5, 5, 0.98); 
        backdrop-filter: blur(12px); z-index: 100; 
        padding: 15px; text-align: center; 
        border-bottom: 2px solid transparent; border-image: var(--gold-grad) 1; 
        overflow: hidden; 
    }
    .light-rays { 
        position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; 
        margin-top: -150px; margin-left: -150px;
        background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(191, 149, 63, 0.08) 10deg, transparent 20deg);
        animation: rays-rotate 40s linear infinite; z-index: 1; pointer-events: none; filter: blur(20px);
    }
    @keyframes rays-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .logo-header { width: 140px; margin-bottom: 8px; position: relative; z-index: 5; }
    .search-bar { width: 85%; max-width: 350px; padding: 10px; background: #111; border: 1px solid #3d331a; border-radius: 8px; color: white; position: relative; z-index: 5; display: block; margin: 0 auto; font-size: 16px; }

    /* --- GRILLE & CARTES --- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 15px; padding-bottom: 160px; position: relative; z-index: 2; }
    @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } .logo-header { width: 110px; } }
    .card { background: var(--card); border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; }
    .item-stock { background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 1.8rem; display: block; margin: 5px 0; }
    input[type="number"] { width: 80%; background: #000; color: #fff; border: 1px solid #333; border-radius: 5px; padding: 8px; text-align: center; }

    /* --- FOOTER & MODAL --- */
    .admin-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid #3d331a; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; z-index: 2000; }
    #userName { width: 100px; padding: 10px; background: #111; color: white; border: 1px solid #3d331a; border-radius: 5px; }
    .btn-save { background: var(--gold-grad); color: #000; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    .fab { position: fixed; bottom: 85px; right: 20px; width: 55px; height: 55px; background: var(--gold-grad); border-radius: 50%; font-size: 1.8rem; border: none; z-index: 2001; cursor: pointer; }

    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 3000; }
    .modal-content { background: #0a0a0a; padding: 20px; border: 1px solid #bf953f; width: 85%; max-width: 320px; text-align: center; border-radius: 10px; }
    .modal-input { width: 100%; margin-bottom: 10px; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
</style>
</head>
<body>

    <div id="glitter-container"></div>

    <div class="header-tools">
        <div class="light-rays"></div>
        <img src="logobw.jpg" class="logo-header" alt="Black And White">
        <input type="text" class="search-bar" placeholder="🔍 Rechercher..." onkeyup="filter(this.value)">
    </div>

    <div id="inventory" class="grid"></div>

    <button class="fab" onclick="toggleModal(true)">+</button>

    <div id="modalAdd" class="modal">
        <div class="modal-content">
            <h2 style="color: #bf953f; margin-top:0;">NOUVEL ITEM</h2>
            <input type="text" id="addByWho" class="modal-input" placeholder="Ton Nom">
            <input type="text" id="newName" class="modal-input" placeholder="Nom de l'objet">
            <input type="number" id="newQty" class="modal-input" placeholder="Quantité" value="1">
            <input type="text" id="newImg" class="modal-input" placeholder="Image URL">
            <button class="btn-save" style="width:100%;" onclick="addNewItem()">AJOUTER</button>
            <button style="background:none; border:none; color:#777; width:100%; margin-top:15px;" onclick="toggleModal(false)">ANNULER</button>
        </div>
    </div>

    <div class="admin-bar">
        <img src="dod.jpg" alt="DOD" style="height:35px; border-radius:4px;">
        <input type="text" id="userName" placeholder="Ton Nom">
        <button class="btn-save" onclick="submitChanges()">Enregistrer</button>
    </div>

<script src="config.js"></script>
<script>
    const API_URL = window.CONFIG.API_URL;
    const DISCORD_WEBHOOK = window.CONFIG.DISCORD_WEBHOOK;
    let originalData = [];
    let changes = {}; 

    const URL_IMAGE_DOD = "https://cdn.discordapp.com/attachments/1498327114385195119/1498423137489129613/dod.jpg?ex=69f11acb&is=69efc94b&hm=65aeb424a0d4cb59de711085fb6ab558553542cf74610826ec90d91e3b6346c4"; 

    function initGlitter() {
        const container = document.getElementById('glitter-container');
        if(!container) return;
        for (let i = 0; i < 60; i++) {
            const g = document.createElement('div');
            g.className = 'glitter';
            const size = Math.random() * 4 + 1 + 'px';
            g.style.width = size; g.style.height = size;
            g.style.left = Math.random() * 100 + '%';
            g.style.animationDuration = Math.random() * 4 + 3 + 's';
            g.style.animationDelay = Math.random() * 7 + 's';
            g.style.boxShadow = `0 0 ${Math.random()*8}px rgba(252, 246, 186, 0.8)`;
            container.appendChild(g);
        }
    }

    async function sendDiscordEmbed(title, description, fields, isDelete = false) {
        if (!DISCORD_WEBHOOK) return;
        const embedColor = isDelete ? 15158332 : 16761095;
        const payload = {
            embeds: [{
                title: title,
                description: description,
                color: embedColor,
                fields: fields,
                thumbnail: { url: URL_IMAGE_DOD },
                footer: { text: "Stockage Officiel - B&W" },
                timestamp: new Date().toISOString()
            }]
        };
        try {
            await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch(e) { console.error("Erreur Webhook:", e); }
    }

    async function load() {
        initGlitter();
        try {
            const resp = await fetch(API_URL);
            const data = await resp.json();
            // Sécurité : on s'assure que chaque item a un nom valide pour le tri
            originalData = Array.isArray(data) ? data.filter(i => i && i.nom) : [];
            originalData.sort((a, b) => String(a.nom).localeCompare(String(b.nom), 'fr'));
            render();
        } catch (e) { console.error("Load error:", e); render(); }
    }

    function render() {
        const container = document.getElementById('inventory');
        if (!originalData || originalData.length === 0) {
            container.innerHTML = "<p style='text-align:center; width:100%; color:#555;'>Aucun item trouvé.</p>";
            return;
        }

        container.innerHTML = originalData.map(item => {
            // SÉCURITÉ : On force le nom en String pour éviter l'erreur toLowerCase()
            const nameStr = String(item.nom || "Inconnu");
            const imgSrc = (item.image && String(item.image).includes('http')) ? item.image : `images/${item.image}`;
            const stockVal = item.stock || 0;

            return `
            <div class="card" data-name="${nameStr.toLowerCase()}">
                <button onclick="deleteItem(${item.id})" style="position:absolute; top:5px; right:5px; background:none; border:none; color:#ff4444; cursor:pointer; font-weight:bold; z-index:10;">✕</button>
                <img src="${imgSrc}" style="width:60px; height:60px; object-fit:contain;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/702/702455.png'">
                <div style="font-size:0.75rem; font-weight:bold; color:var(--steel); margin-top:5px;">${nameStr}</div>
                <span class="item-stock">${stockVal}</span>
                <input type="number" placeholder="+/-" oninput="trackChange(${item.id}, this.value, ${stockVal})">
            </div>`;
        }).join('');
    }

    function trackChange(id, value, oldStock) {
        const val = parseInt(value);
        if (!isNaN(val) && value !== "") changes[id] = oldStock + val;
        else delete changes[id];
    }

    async function addNewItem() {
        const creator = document.getElementById('addByWho').value.trim();
        const nom = document.getElementById('newName').value.trim();
        const stock = parseInt(document.getElementById('newQty').value) || 0;
        const img = document.getElementById('newImg').value.trim();
        if(!creator || !nom) return alert("Champs requis !");
        
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', nom: nom, stock: stock, image: img }) });
        
        await sendDiscordEmbed(
            "✨ NOUVELLE ENTRÉE DANS L'INVENTAIRE",
            `Le membre **${creator}** a enregistré un item dans le stock.`,
            [
                { name: "📦 Objet", value: `\`${nom}\``, inline: true },
                { name: "💰 Nombre", value: `\`${stock}\``, inline: true }
            ]
        );
        location.reload();
    }

    async function submitChanges() {
        const user = document.getElementById('userName').value.trim();
        if (!user) return alert("Indique ton nom avant d'enregistrer !");
        if (Object.keys(changes).length === 0) return alert("Aucune modification à enregistrer.");
        
        let fields = [];
        const updates = Object.keys(changes).map(id => {
            const item = originalData.find(i => i.id == id);
            if(item) {
                fields.push({ 
                    name: `🔹 ${item.nom}`, 
                    value: `Mouvement : \`${item.stock}\` ➔ **${changes[id]}**`, 
                    inline: false 
                });
            }
            return { id: parseInt(id), nouveauStock: changes[id] };
        });

        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'bulk_update', updates: updates }) });
        
        await sendDiscordEmbed(
            "📀 MISE À JOUR INVENTAIRE",
            `Des modifications de stock ont été validées par **${user}**.`,
            fields
        );
        location.reload();
    }

    async function deleteItem(id) {
        const user = document.getElementById('userName').value.trim();
        if (!user) return alert("Indique ton nom pour supprimer !");
        const item = originalData.find(i => i.id == id);
        if (!item) return;

        if (confirm(`Supprimer définitivement ${item.nom} ?`)) {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: id }) });
            
            await sendDiscordEmbed(
                "🗑️ SUPPRESSION D'OBJET DANS L'INVENTAIRE",
                `L'item suivant a été retiré du stock par **${user}**.`,
                [{ name: "❌ Item", value: item.nom, inline: true }],
                true
            );
            location.reload();
        }
    }

    function filter(val) {
        const v = val.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            const name = c.getAttribute('data-name') || "";
            c.style.display = name.includes(v) ? 'block' : 'none';
        });
    }

    function toggleModal(show) { document.getElementById('modalAdd').style.display = show ? 'flex' : 'none'; }
    
    window.onload = load;
</script>
</body>
</html>
